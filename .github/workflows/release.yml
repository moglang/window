name: Release native artifacts

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64-gnu
          - os: macos-latest
            target: macos-arm64
    steps:
      - uses: actions/checkout@v4
      - name: Install SDL2 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev
      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2
      - name: Build package
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
      - name: Bundle native artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.target }}"
          cp mog.toml package.api.mog "dist/${{ matrix.target }}/"
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            cp package.so "dist/${{ matrix.target }}/package.so"
          else
            cp package.dylib "dist/${{ matrix.target }}/package.dylib"
          fi
          tar -C dist -czf "window-${{ matrix.target }}.tar.gz" "${{ matrix.target }}"
      - uses: actions/upload-artifact@v4
        with:
          name: window-${{ matrix.target }}
          path: window-${{ matrix.target }}.tar.gz

  release:
    name: Publish GitHub Release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
